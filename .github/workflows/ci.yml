name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run tests
        run: pytest test_app.py -v --cov=app --cov-report=term-missing

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
      - name: Build image
        run: docker build -t llm-token-estimator:latest .
      - name: Verify container starts
        run: |
          docker run -d --name test_container -p 8501:8501 llm-token-estimator:latest
          sleep 5
          docker ps | grep test_container
          docker stop test_container
